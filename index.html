<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCE.IO // PRO MAX</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#050508">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZpbmFuY2UuSU8gMjAyNiIsCiAgInNob3J0X25hbWUiOiAiRmluYW5jZTI2IiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MDgiLAogICJ0aGVtZV9jb2xvciI6ICIjZmY3ZDZkIgp9">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(25, 25, 35, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ff7d6d;
            --accent-glow: rgba(255, 125, 109, 0.4);
            --green: #00f2a6;
            --text: #f0f0f5;
            --text-dim: #8a8a9d;
            --font-main: 'Space Mono', monospace;
            --font-title: 'Unbounded', cursive;
            --blur: 25px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 125, 109, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 166, 0.04) 0%, transparent 40%);
            color: var(--text);
            font-family: var(--font-main);
            min-height: 100vh;
            padding: 24px 24px 100px 24px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Typography */
        .amount-hero { font-family: var(--font-title); font-size: clamp(2rem, 6vw, 3.2rem); letter-spacing: -2px; transition: filter 0.3s; }
        .masked .amount-hero, .masked .amount-sub { filter: blur(12px); pointer-events: none; }
        .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        /* Bento 2.1 */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 20px;
        }

        .bento-item {
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 32px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }

        .bento-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
        }

        .span-2 { grid-column: span 2; }
        .span-4 { grid-column: span 4; }
        .row-2 { grid-row: span 2; }

        /* Privacy Toggle */
        .privacy-toggle {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--glass-strong); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: 0.3s;
        }
        .privacy-toggle:hover { transform: scale(1.1); border-color: var(--accent); }

        /* Floating Nav (Mobile First) */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 48px); max-width: 500px;
            background: var(--glass-strong); border: 1px solid var(--border);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; height: 75px; display: flex;
            align-items: center; justify-content: space-around; padding: 0 20px;
            z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .nav-btn {
            width: 50px; height: 50px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: 0.3s; color: var(--text-dim);
        }
        .nav-btn.active { color: var(--accent); background: rgba(255,125,109,0.1); }
        .nav-btn.main-action { background: var(--accent); color: #000; transform: translateY(-15px); width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 10px 25px var(--accent-glow); }

        /* Donut Charts */
        .donut-container { display: flex; align-items: center; justify-content: center; position: relative; }
        #donut-svg { transform: rotate(-90deg); transition: 1s cubic-bezier(0.3, 1, 0.3, 1); }
        .donut-label { position: absolute; text-align: center; }

        /* Modal 2.1 */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .overlay.active { display: flex; }
        .modal {
            background: #0a0a0f; border: 1px solid var(--border);
            width: 100%; max-width: 450px; border-radius: 40px; padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Forms */
        .glass-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: #fff; padding: 18px; border-radius: 20px; margin-bottom: 20px;
            font-family: var(--font-main); transition: 0.3s;
        }
        .glass-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        /* Month Pills */
        .month-scroller { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; margin-bottom: 32px; }
        .pill { 
            padding: 12px 28px; border-radius: 50px; background: var(--glass);
            border: 1px solid var(--border); cursor: pointer; transition: 0.4s;
            font-size: 0.9rem; white-space: nowrap;
        }
        .pill.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        /* Responsive */
        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr 1fr; }
            .span-4, .span-2 { grid-column: span 2; }
        }
        @media (max-width: 600px) {
            .bento-grid { grid-template-columns: 1fr; }
            .span-4, .span-2 { grid-column: span 1; }
        }
    </style>
</head>
<body id="app">

<div class="privacy-toggle" onclick="togglePrivacy()" title="Privacy Mode">
    <span id="privacy-icon">👁️</span>
</div>

<div class="container">
    <header style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-family: var(--font-title); font-size: 1.5rem;">FINANCE<span>.</span>IO</div>
        <div class="label" style="opacity: 0.5;">ID: 2026-PRO-MAX</div>
    </header>

    <div id="months" class="month-scroller"></div>

    <div class="bento-grid">
        <!-- Hero Stats -->
        <div class="bento-item span-2">
            <span class="label">Net Balance</span>
            <span class="amount-hero" id="hero-balance">0.00 €</span>
            <div style="display: flex; gap: 40px; margin-top: 24px;">
                <div><span class="label">Incoming</span><div class="amount-sub" style="color: var(--green); font-family: var(--font-title);" id="hero-inc">+0.00</div></div>
                <div><span class="label">Outgoing</span><div class="amount-sub" style="color: var(--accent); font-family: var(--font-title);" id="hero-exp">-0.00</div></div>
            </div>
        </div>

        <!-- AI Analyst -->
        <div class="bento-item" style="background: linear-gradient(135deg, rgba(255, 125, 109, 0.12), transparent);">
            <span class="label">AI Insight</span>
            <div id="ai-suggestion" style="font-size: 0.85rem; margin-top: 20px; font-weight: 500;">
                Обрабатываю ваш денежный поток...
            </div>
        </div>

        <!-- Budget Gauge -->
        <div class="bento-item">
            <span class="label">Safe Zone</span>
            <div style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.8rem;">
                    <span id="gauge-label">Healthy</span><span id="gauge-perc">0%</span>
                </div>
                <div style="height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden;">
                    <div id="gauge-bar" style="height: 100%; width: 0%; background: var(--accent); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);"></div>
                </div>
            </div>
        </div>

        <!-- Distribution Donut -->
        <div class="bento-item span-2 row-2">
            <span class="label">Category Flow</span>
            <div class="donut-container" style="height: calc(100% - 20px);">
                <svg id="donut-svg" width="220" height="220" viewBox="0 0 42 42">
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="3"></circle>
                </svg>
                <div class="donut-label">
                    <span id="donut-total" style="font-family: var(--font-title); font-size: 1.8rem;">0</span>
                    <div style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;">EUR</div>
                </div>
            </div>
        </div>

        <!-- List Section -->
        <div class="bento-item span-2 row-2">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <span class="label">Transactions</span>
                <input type="text" id="search" placeholder="Quick find..." style="background: transparent; border: none; border-bottom: 1px solid var(--border); color: #fff; font-size: 0.8rem; width: 100px; padding-bottom: 4px;">
            </div>
            <div id="history-flow" style="display: flex; flex-direction: column; gap: 16px; max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
        </div>
    </div>
</div>

<!-- Floating Navigation -->
<nav class="bottom-nav">
    <div class="nav-btn active" onclick="showScreen('dashboard')">🏠</div>
    <div class="nav-btn" onclick="openActionModal()">➕</div>
    <div class="nav-btn" onclick="exportData()">💾</div>
    <div class="nav-btn" onclick="importData()">📂</div>
</nav>

<!-- Interaction Modals -->
<div id="action-overlay" class="overlay" onclick="closeModals()">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 style="font-family: var(--font-title); font-size: 1.2rem; margin-bottom: 30px;">New Transaction</h2>
        <form id="tx-form">
            <input type="text" id="in-name" class="glass-input" placeholder="Title (e.g. Prisma)" required>
            <input type="number" id="in-amount" class="glass-input" placeholder="Amount (€)" step="0.01" required>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button type="button" class="btn" onclick="closeModals()" style="padding: 18px; border-radius: 20px; font-weight: bold; background: var(--glass);">Cancel</button>
                <button type="submit" class="btn" style="padding: 18px; border-radius: 20px; font-weight: bold; background: var(--accent); color: #000;">Confirm</button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- Application State ---
    let state = {
        transactions: [],
        categories: {
            'Groceries': { emoji: '🛒', color: '#00f2a6', keys: ['prisma','lidl','selver','rimu','maxima','grossi'] },
            'Mobility': { emoji: '⛽', color: '#35baf6', keys: ['bolt','uber','fuel','bus','parking'] },
            'Lifestyle': { emoji: '🍹', color: '#ff7d6d', keys: ['netflix','spotify','cinema','cafe','pizza'] },
            'Income': { emoji: '💰', color: '#00f2a6', keys: ['salary','palk','transfer'] },
            'Other': { emoji: '📦', color: '#8a8a9d', keys: [] }
        },
        selectedMonth: new Date().toISOString().substring(0, 7),
        isPrivate: false
    };

    const STORAGE_KEY = 'FINANCE_IO_PRO_MAX_V1';

    // --- Core Logic ---
    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
        else seed();
        render();
    }

    function seed() {
        const m = state.selectedMonth;
        state.transactions = [
            { id: 1, name: 'Salary Pro', amount: 3500, cat: 'Income', date: `${m}-01`, type: 'income' },
            { id: 2, name: 'Prisma Groceries', amount: -112.40, cat: 'Groceries', date: `${m}-02`, type: 'expense' },
            { id: 3, name: 'Bolt Mobility', amount: -14.20, cat: 'Mobility', date: `${m}-03`, type: 'expense' }
        ];
    }

    function togglePrivacy() {
        state.isPrivate = !state.isPrivate;
        document.getElementById('app').classList.toggle('masked', state.isPrivate);
        document.getElementById('privacy-icon').innerText = state.isPrivate ? '🙈' : '👁️';
    }

    // --- Rendering Suite ---
    function render() {
        const filtered = state.transactions.filter(t => t.date.startsWith(state.selectedMonth));
        const inc = filtered.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const exp = filtered.filter(t => t.type === 'expense').reduce((s, t) => s + Math.abs(t.amount), 0);

        // Stats Update
        document.getElementById('hero-balance').innerText = `${(inc - exp).toFixed(2)} €`;
        document.getElementById('hero-inc').innerText = `+${inc.toFixed(2)}`;
        document.getElementById('hero-exp').innerText = `-${exp.toFixed(2)}`;

        // Donut Logic
        const totals = {};
        filtered.filter(t=>t.type==='expense').forEach(t => totals[t.cat] = (totals[t.cat] || 0) + Math.abs(t.amount));
        const totalExp = Object.values(totals).reduce((a, b) => a + b, 0);
        document.getElementById('donut-total').innerText = Math.round(totalExp);
        
        const svg = document.getElementById('donut-svg');
        svg.querySelectorAll('.slice').forEach(n => n.remove());
        let offset = 0;
        Object.entries(totals).forEach(([cat, val]) => {
            const perc = (val / (totalExp || 1)) * 100;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("class", "slice"); circle.setAttribute("cx", "21"); circle.setAttribute("cy", "21"); circle.setAttribute("r", "15.9155");
            circle.setAttribute("fill", "transparent"); circle.setAttribute("stroke", state.categories[cat]?.color || '#fff');
            circle.setAttribute("stroke-width", "4"); circle.setAttribute("stroke-dasharray", `${perc} ${100 - perc}`);
            circle.setAttribute("stroke-dashoffset", -offset);
            svg.appendChild(circle); offset += perc;
        });

        // History Update
        const searchVal = document.getElementById('search').value.toLowerCase();
        document.getElementById('history-flow').innerHTML = filtered
            .filter(t => t.name.toLowerCase().includes(searchVal))
            .sort((a,b) => new Date(b.date) - new Date(a.date))
            .map(t => `
            <div style="display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 15px; padding: 12px; border-radius: 24px; background: rgba(255,255,255,0.015);">
                <div style="font-size: 1.2rem; background: rgba(255,255,255,0.03); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 14px;">${state.categories[t.cat]?.emoji || '📦'}</div>
                <div><div style="font-weight: 700; font-size: 0.9rem; color: #fff;">${t.name}</div><div style="font-size: 0.7rem; color: var(--text-dim);">${t.date}</div></div>
                <div style="font-family: var(--font-title); font-size: 0.9rem; color: ${t.type==='income'?'var(--green)':'#fff'}">${t.amount.toFixed(2)}</div>
            </div>`).join('') || '<div style="text-align:center; color: var(--text-dim); font-size: 0.8rem;">No entries found.</div>';

        // AI & Gauge
        const p = Math.min((exp / 2800) * 100, 100);
        document.getElementById('gauge-bar').style.width = p + '%';
        document.getElementById('gauge-perc').innerText = Math.round(p) + '%';
        document.getElementById('ai-suggestion').innerText = exp > 2000 ? "Warning: Your spend rate is 15% higher than usual. Audit 'Lifestyle'." : "Perfect flow! You're saving 22% of your monthly income.";

        renderMonths();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderMonths() {
        const months = [...new Set(state.transactions.map(t => t.date.substring(0, 7)))].sort().reverse();
        document.getElementById('months').innerHTML = months.map(m => `<div class="pill ${state.selectedMonth === m ? 'active' : ''}" onclick="state.selectedMonth='${m}'; render();">${m}</div>`).join('');
    }

    // --- Interaction ---
    window.openActionModal = () => document.getElementById('action-overlay').classList.add('active');
    window.closeModals = () => document.getElementById('action-overlay').classList.remove('active');

    document.getElementById('tx-form').onsubmit = (e) => {
        e.preventDefault();
        const n = document.getElementById('in-name').value;
        const a = parseFloat(document.getElementById('in-amount').value);
        const cat = Object.keys(state.categories).find(c => state.categories[c].keys.some(k => n.toLowerCase().includes(k))) || 'Other';
        
        state.transactions.push({ id: Date.now(), name: n, amount: a, cat: cat, date: new Date().toISOString().substring(0, 10), type: a > 0 ? 'income' : 'expense' });
        e.target.reset(); closeModals(); render();
    };

    document.getElementById('search').oninput = render;

    window.exportData = () => {
        const b = new Blob([JSON.stringify(state)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'finance_pro_max.json'; a.click();
    };

    window.importData = () => {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = event => { state = JSON.parse(event.target.result); render(); };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    };

    init();
</script>
</body>
</html>
