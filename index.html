<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060608">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FINANCE.IO // 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ── */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:       #060608;
  --bg2:      #0c0c10;
  --glass:    rgba(255,255,255,0.04);
  --glass2:   rgba(255,255,255,0.07);
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.13);
  --accent:   #ff5c1a;
  --accent2:  #ff8a5c;
  --green:    #22d98a;
  --red:      #ff3b5c;
  --yellow:   #f5c542;
  --text:     #f0f0f4;
  --muted:    rgba(240,240,244,0.38);
  --muted2:   rgba(240,240,244,0.6);
  --r:        16px;
  --r2:       24px;
  --shadow:   0 8px 40px rgba(0,0,0,0.6);
}

html{ scroll-behavior:smooth; }

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Ambient background blobs */
body::before{
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 800px 500px at 10% 10%, rgba(255,92,26,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 90% 80%, rgba(34,217,138,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 60% 30%, rgba(255,59,92,0.04) 0%, transparent 70%);
  pointer-events:none;
}

/* Subtle grid */
body::after{
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

.page{ position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:28px 20px 60px; }

/* ── Glass card base ── */
.g{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--r2);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:border-color .2s, box-shadow .2s;
}
.g:hover{ border-color:var(--border2); }

/* ── Header ── */
header{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:32px; flex-wrap:wrap; gap:12px;
}
/* ── Logo ── */
.logo-wrap{
  display:flex; align-items:center; gap:12px;
  flex-shrink:0;
}
.logo-icon{
  width:44px; height:38px; flex-shrink:0;
  overflow:visible;
}
.lp{
  stroke-dasharray:120;
  stroke-dashoffset:120;
}
.lp1{ animation:lpDraw .9s cubic-bezier(.4,0,.2,1) .1s forwards; }
.lp2{ animation:lpDraw .8s cubic-bezier(.4,0,.2,1) .5s forwards; }
@keyframes lpDraw{ to{ stroke-dashoffset:0; } }

.logo-text{
  display:flex; align-items:baseline; gap:0;
  font-family:'Syne',sans-serif;
  font-size:22px; font-weight:800;
  letter-spacing:-0.5px;
  white-space:nowrap;
}
.lt{
  display:inline-block;
  opacity:0;
  transform:translateY(6px);
  animation:ltReveal .35s cubic-bezier(.34,1.4,.64,1) forwards;
  animation-delay:calc(.55s + var(--i) * .055s);
}
.logo-dot-char{
  color:var(--accent);
  animation:ltReveal .35s cubic-bezier(.34,1.4,.64,1) forwards, dotPulse 2.5s ease-in-out 1.6s infinite;
  animation-delay:calc(.55s + 7 * .055s), 1.6s;
}
@keyframes ltReveal{
  to{ opacity:1; transform:translateY(0); }
}
@keyframes dotPulse{
  0%,100%{ text-shadow:0 0 0 transparent; color:var(--accent); }
  50%{ text-shadow:0 0 14px rgba(255,92,26,.7), 0 0 28px rgba(255,92,26,.3); color:#ff8a5c; }
}

.hbtns{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

.btn{
  font-family:'DM Mono',monospace;
  font-size:11px; font-weight:500;
  color:var(--muted2);
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 16px;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:0.3px;
  white-space:nowrap;
}
.btn:hover{ color:var(--text); border-color:var(--border2); background:var(--glass2); }
.btn-accent{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:500;
  box-shadow:0 4px 20px rgba(255,92,26,0.35);
}
.btn-accent:hover{ background:#ff6b35; border-color:#ff6b35; box-shadow:0 4px 28px rgba(255,92,26,0.5); color:#fff; }

#saveStatus{ font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }

/* ── Month pills ── */
.month-strip{
  display:flex; gap:6px;
  overflow-x:auto; padding-bottom:6px;
  margin-bottom:28px;
  scrollbar-width:none;
}
.month-strip::-webkit-scrollbar{ display:none; }

.pill{
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  background:transparent;
  border:1px solid var(--border);
  border-radius:50px;
  padding:7px 18px;
  cursor:pointer;
  white-space:nowrap;
  transition:all .2s;
  flex-shrink:0;
}
.pill:hover{ color:var(--text); border-color:var(--border2); }
.pill.active{
  color:var(--accent);
  border-color:var(--accent);
  background:rgba(255,92,26,0.1);
  box-shadow:0 0 16px rgba(255,92,26,0.15);
}

/* ── Bento grid ── */
.bento{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:14px;
  margin-bottom:14px;
}

/* Stat cards */
.stat-card{ grid-column:span 4; padding:24px; position:relative; overflow:hidden; }
.stat-card::before{
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  border-radius:var(--r2) var(--r2) 0 0;
}
.stat-card.inc::before{ background:linear-gradient(90deg,var(--green),transparent); }
.stat-card.exp::before{ background:linear-gradient(90deg,var(--red),transparent); }
.stat-card.bal::before{ background:linear-gradient(90deg,var(--accent),transparent); }
.stat-label{
  font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
}
.stat-val{
  font-family:'Syne',sans-serif;
  font-size:28px; font-weight:800;
  letter-spacing:-1px;
  line-height:1;
}

/* Donut card */
.donut-card{ grid-column:span 4; padding:24px; display:flex; flex-direction:column; }
.donut-inner{ display:flex; flex-direction:column; align-items:center; position:relative; flex:1; justify-content:center; }
#donutSvg{ transform:rotate(-90deg); }
.donut-center{
  position:absolute;
  font-family:'Syne',sans-serif;
  font-weight:800; font-size:18px;
  text-align:center; line-height:1.2;
}
.donut-center small{ font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); font-weight:400; display:block; }
.donut-legend{ margin-top:14px; display:flex; flex-direction:column; gap:6px; }
.dl-item{
  display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted2);
  padding:7px 8px; border-radius:10px; cursor:pointer; transition:all .18s;
  border:1px solid transparent;
}
.dl-item:hover{ background:rgba(255,255,255,0.05); color:var(--text); border-color:var(--border); }
.dl-item.active{ background:rgba(255,92,26,0.08); border-color:rgba(255,92,26,0.35); color:var(--text); }
.dl-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dl-amount{ font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
.dl-pct{ font-family:'DM Mono',monospace; font-size:10px; color:var(--text); min-width:30px; text-align:right; }

/* Budget card */
.budget-card{ grid-column:span 8; padding:24px; }
.card-title{
  font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:18px;
  display:flex; justify-content:space-between; align-items:center;
}
.card-action{
  color:var(--accent); cursor:pointer;
  font-size:10px; letter-spacing:1px;
  transition:opacity .2s;
}
.card-action:hover{ opacity:.7; }

.budget-item{ margin-bottom:14px; }
.budget-item:last-child{ margin-bottom:0; }
.b-row{ display:flex; justify-content:space-between; font-size:11px; margin-bottom:6px; align-items:center; }
.b-track{ height:4px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
.b-fill{ height:100%; border-radius:4px; transition:width .5s cubic-bezier(0.4,0,0.2,1); }
.pulse{ animation:pulseAnim 1.8s ease-in-out infinite; }
@keyframes pulseAnim{ 0%,100%{opacity:1} 50%{opacity:0.35} }

/* Period stats */
.period-card{ grid-column:span 12; padding:24px; }
.period-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
.p-tile{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
}
.p-label{ font-family:'DM Mono',monospace; font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.p-val{ font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
.compare-row{ display:flex; gap:10px; align-items:center; padding-top:14px; border-top:1px solid var(--border); }
.badge{
  font-family:'DM Mono',monospace;
  font-size:10px; font-weight:500;
  padding:4px 12px; border-radius:50px;
}
.badge.up{ background:rgba(255,59,92,0.15); color:var(--red); border:1px solid rgba(255,59,92,0.25); }
.badge.down{ background:rgba(34,217,138,0.12); color:var(--green); border:1px solid rgba(34,217,138,0.2); }
.badge.flat{ background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }

/* Forecast card */
.fc-bar-wrap{ width:100%; height:8px; background:rgba(255,255,255,0.07); border-radius:8px; margin:12px 0 6px; position:relative; overflow:visible; }
.fc-actual{ height:100%; border-radius:8px; transition:width .5s; }
.fc-proj{ position:absolute; top:0; height:100%; border-radius:8px; opacity:.22; }
.fc-marker{ position:absolute; top:-5px; width:2px; height:18px; background:#fff; border-radius:2px; opacity:.8; }
.fc-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px; }

/* Chart */
.chart-card{ grid-column:span 12; padding:24px; }
.chart-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.chart-modes{ display:flex; gap:4px; }
.chart-mode-btn{
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.5px;
  padding:5px 12px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer; transition:all .18s;
}
.chart-mode-btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(255,92,26,0.08); }
.chart-wrap{ position:relative; width:100%; }
.chart-svg{ width:100%; overflow:visible; display:block; }
.chart-tooltip{
  position:absolute; pointer-events:none;
  background:#0f0f18; border:1px solid var(--border2);
  border-radius:10px; padding:10px 14px;
  font-family:'DM Mono',monospace; font-size:11px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  opacity:0; transition:opacity .15s; z-index:10;
  min-width:140px; white-space:nowrap;
}
.chart-tooltip.show{ opacity:1; }
.tt-date{ font-size:10px; color:var(--muted); margin-bottom:6px; }
.tt-row{ display:flex; justify-content:space-between; gap:12px; align-items:center; }
.tt-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.tt-label{ color:var(--muted); font-size:10px; }
.tt-val{ font-weight:600; }
.chart-legend{ display:flex; gap:16px; margin-top:12px; flex-wrap:wrap; }
.legend-item{ display:flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
.legend-dot{ width:8px; height:8px; border-radius:2px; }

/* Transactions section */
.tx-card{ grid-column:span 12; padding:24px; }
.tx-toolbar{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px; flex-wrap:wrap; gap:10px;
}
.tx-heading{
  font-family:'Syne',sans-serif;
  font-size:18px; font-weight:800;
  display:flex; align-items:baseline; gap:8px;
}
.tx-count{ font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); font-weight:400; }
.sort-sel{
  font-family:'DM Mono',monospace; font-size:11px;
  background:var(--glass); border:1px solid var(--border);
  border-radius:10px; padding:7px 12px;
  color:var(--muted2); cursor:pointer; outline:none; transition:.2s;
}

.search-row{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.inp{
  font-family:'DM Mono',monospace; font-size:11px;
  background:var(--glass); border:1px solid var(--border);
  border-radius:10px; padding:9px 14px;
  color:var(--text); outline:none; transition:.2s;
}
.inp::placeholder{ color:var(--muted); }
.inp:focus{ border-color:rgba(255,92,26,0.4); background:var(--glass2); }

.filter-strip{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.f-btn{
  font-family:'DM Mono',monospace; font-size:10px;
  padding:5px 13px; border-radius:50px;
  border:1px solid var(--border);
  background:transparent; color:var(--muted);
  cursor:pointer; transition:all .15s;
}
.f-btn:hover{ color:var(--text); border-color:var(--border2); }
.f-btn.active{ color:var(--accent); border-color:var(--accent); background:rgba(255,92,26,0.08); }

/* Transaction rows */
.tx-list-wrap{ display:flex; flex-direction:column; gap:2px; }
.tx-item{
  display:flex; align-items:center; gap:14px;
  padding:13px 10px; border-radius:14px;
  transition:background .15s;
  cursor:default;
}
.tx-item:hover{ background:var(--glass); }
.tx-ico{
  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.tx-info{ flex:1; min-width:0; }
.tx-name{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta{ font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); margin-top:3px; }
.cat-sel{
  font-family:'DM Mono',monospace; font-size:10px;
  background:transparent; border:1px solid transparent;
  border-radius:6px; padding:2px 6px;
  cursor:pointer; outline:none; color:inherit;
  transition:.2s; margin-top:4px; max-width:160px;
  display:block;
}
.tx-right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.tx-amt{
  font-family:'Syne',sans-serif;
  font-size:15px; font-weight:800;
  letter-spacing:-0.3px;
}
.tx-amt.pos{ color:var(--green); }
.tx-actions{ display:flex; gap:4px; }
.ico-btn{
  width:28px; height:28px; border-radius:8px;
  background:transparent; border:1px solid var(--border);
  color:var(--muted); font-size:12px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.ico-btn.e:hover{ border-color:var(--accent); color:var(--accent); background:rgba(255,92,26,0.08); }
.ico-btn.d:hover{ border-color:var(--red); color:var(--red); background:rgba(255,59,92,0.08); }
.empty-state{ text-align:center; padding:40px; color:var(--muted); font-size:13px; }

/* Overlays */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:300;
  display:flex; align-items:flex-end; justify-content:center;
  padding:0;
  opacity:0; pointer-events:none;
  transition:opacity .25s;
}
.overlay.open{ opacity:1; pointer-events:all; }
.modal{
  background:#0f0f14;
  border:1px solid var(--border2);
  border-radius:28px 28px 0 0;
  padding:32px 28px;
  width:100%; max-width:520px;
  transform:translateY(40px);
  transition:transform .28s cubic-bezier(0.34,1.2,0.64,1);
  box-shadow:0 -20px 60px rgba(0,0,0,0.7);
}
.overlay.open .modal{ transform:translateY(0); }
.modal-title{ font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:22px; }
.modal-title span{ color:var(--accent); }
.m-label{ font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; display:block; }
.modal-actions{ display:flex; gap:10px; margin-top:22px; }
.m-save{
  flex:1; font-family:'Syne',sans-serif; font-size:12px; font-weight:700;
  padding:13px; border-radius:12px; border:none;
  background:var(--accent); color:#fff; cursor:pointer;
  transition:all .2s;
}

/* FAB */
.fab{
  position:fixed; bottom:24px; right:24px; z-index:200;
  width:56px; height:56px; border-radius:50%;
  background:var(--accent); color:#fff;
  font-size:28px; line-height:1; border:none;
  cursor:pointer; box-shadow:0 6px 28px rgba(255,92,26,0.5);
  display:flex; align-items:center; justify-content:center;
}

/* Emoji picker */
.emoji-grid{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.emoji-btn{
  font-size:18px; background:var(--glass); border:1px solid var(--border);
  border-radius:8px; padding:4px 6px; cursor:pointer;
}

/* Scrollbar */
::-webkit-scrollbar{ width:4px; height:4px; }
::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:4px; }
</style>
</head>
<body>
<div class="page">

<!-- Header -->
<header>
  <div class="logo-wrap">
    <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 50" fill="none">
      <defs><linearGradient id="lgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff5c1a"/><stop offset="100%" stop-color="#ff9f43"/></linearGradient></defs>
      <path class="lp lp1" d="M6 44V8H28M6 26H22" stroke="url(#lgGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path class="lp lp2" d="M32 44L40 24L48 34L56 8" stroke="url(#lgGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text" aria-label="FINANCE.IO">
      <span class="lt" style="--i:0">F</span><span class="lt" style="--i:1">I</span><span class="lt" style="--i:2">N</span><span class="lt" style="--i:3">A</span><span class="lt" style="--i:4">N</span><span class="lt" style="--i:5">C</span><span class="lt" style="--i:6">E</span><span class="lt logo-dot-char" style="--i:7">.</span><span class="lt" style="--i:8">I</span><span class="lt" style="--i:9">O</span>
    </div>
  </div>
  <div class="hbtns">
    <span id="saveStatus"></span>
    <button class="btn" onclick="exportJSON()">↑ JSON</button>
    <button class="btn" onclick="openOv('importOv')">↓ Импорт</button>
    <button class="btn btn-accent" onclick="openAddOv()">+ Операция</button>
  </div>
</header>

<div class="month-strip" id="monthStrip"></div>

<div class="bento">
  <div class="g stat-card inc"><div class="stat-label">Доходы</div><div class="stat-val" id="sInc" style="color:var(--green)">0 €</div></div>
  <div class="g stat-card exp"><div class="stat-label">Расходы</div><div class="stat-val" id="sExp" style="color:var(--red)">0 €</div></div>
  <div class="g stat-card bal"><div class="stat-label">Баланс</div><div class="stat-val" id="sBal" style="color:var(--accent)">0 €</div></div>

  <div class="g donut-card">
    <div class="card-title">Структура</div>
    <div class="donut-inner">
      <svg id="donutSvg" width="140" height="140" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.9" fill="transparent" stroke="rgba(255,255,255,0.06)" stroke-width="4.5"/></svg>
      <div class="donut-center" id="donutCenter"><span id="donutTotal">0</span><small>EUR</small></div>
    </div>
    <div class="donut-legend" id="donutLegend"></div>
  </div>

  <div class="g budget-card">
    <div class="card-title">Бюджеты <span class="card-action" onclick="openOv('budgetOv')">+ лимит</span></div>
    <div id="budgetList"></div>
  </div>

  <div class="g period-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div class="card-title" style="margin-bottom:0">Аналитика</div>
      <div style="display:flex;gap:6px;">
        <button class="chart-mode-btn active" id="itabStats" onclick="setInsightTab('stats')">Статистика</button>
        <button class="chart-mode-btn" id="itabForecast" onclick="setInsightTab('forecast')">Прогноз</button>
      </div>
    </div>
    <div id="insightStats"><div class="period-grid" id="periodGrid"></div><div id="periodCompare"></div></div>
    <div id="insightForecast" style="display:none"><div id="forecastBody"></div></div>
  </div>

  <div class="g chart-card">
    <div class="chart-toolbar">
      <div class="card-title" id="chartTitle" style="margin-bottom:0">По дням</div>
      <div class="chart-modes">
        <button class="chart-mode-btn active" id="cmBars" onclick="setChartMode('bars')">Столбцы</button>
        <button class="chart-mode-btn" id="cmLine" onclick="setChartMode('line')">Баланс</button>
      </div>
    </div>
    <div class="chart-wrap">
      <svg class="chart-svg" id="chartSvg" height="160"></svg>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
  </div>

  <div class="g tx-card">
    <div class="tx-toolbar">
      <div class="tx-heading">Операции <span class="tx-count" id="txCount"></span></div>
      <select class="sort-sel" id="sortSel" onchange="currentSort=this.value;renderTx()">
        <option value="date-desc">Дата ↓</option><option value="date-asc">Дата ↑</option>
        <option value="amount-desc">Сумма ↓</option><option value="amount-asc">Сумма ↑</option>
      </select>
    </div>
    <div class="search-row">
      <input class="inp" id="searchBox" placeholder="Поиск..." oninput="renderTx()" style="flex:1"/>
      <input class="inp" id="amtMin" type="number" placeholder="От €" oninput="renderTx()" style="width:80px;"/>
      <input class="inp" id="amtMax" type="number" placeholder="До €" oninput="renderTx()" style="width:80px;"/>
    </div>
    <div class="filter-strip" id="txFilters"></div>
    <div class="tx-list-wrap" id="txList"></div>
  </div>
</div>

<button class="fab" onclick="openAddOv()">+</button>
</div>

<!-- Overlays -->
<div class="overlay" id="addOv">
<div class="modal">
  <div class="modal-title">Новая <span>операция</span></div>
  <div style="display:flex;gap:6px;margin-bottom:16px;">
    <button class="btn" id="addBtnExp" onclick="setAddType('expense')" style="flex:1">− Расход</button>
    <button class="btn" id="addBtnInc" onclick="setAddType('income')" style="flex:1">+ Доход</button>
  </div>
  <label class="m-label">Название</label><input class="inp" id="moTxName" style="width:100%;margin-bottom:12px;"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
    <div><label class="m-label">Сумма €</label><input class="inp" id="moTxAmt" type="number" step="0.01"/></div>
    <div><label class="m-label">Дата</label><input class="inp" id="moTxDate" type="date"/></div>
  </div>
  <label class="m-label">Категория</label><select class="inp" id="moTxCat" style="width:100%"></select>
  <div class="modal-actions">
    <button class="btn" onclick="closeOv('addOv')">Отмена</button>
    <button class="m-save" onclick="addTxModal()">ДОБАВИТЬ</button>
  </div>
</div>
</div>

<div class="overlay" id="importOv">
<div class="modal">
  <div class="modal-title">Импорт <span>данных</span></div>
  <div class="drop-zone" id="csvDrop" onclick="document.getElementById('csvFile').click()">
    <span style="font-size:28px">📊</span><span style="font-size:11px;color:var(--muted)">Нажми или перетащи .csv (Swedbank)</span>
    <input type="file" id="csvFile" hidden onchange="handleCSV(this.files[0])"/>
  </div>
  <div id="csvStatus" style="margin-top:10px;font-size:10px;"></div>
  <div class="modal-actions"><button class="btn" style="width:100%" onclick="closeOv('importOv')">Закрыть</button></div>
</div>
</div>

<div class="overlay" id="budgetOv">
<div class="modal">
  <div class="modal-title">Лимит <span>категории</span></div>
  <label class="m-label">Категория</label><select class="inp" id="budgetCat" style="width:100%;margin-bottom:12px;"></select>
  <label class="m-label">Лимит €</label><input class="inp" id="budgetLimit" type="number" style="width:100%;"/>
  <div class="modal-actions"><button class="btn" onclick="closeOv('budgetOv')">Отмена</button><button class="m-save" onclick="saveBudget()">СОХРАНИТЬ</button></div>
</div>
</div>

<script>
// ── State ──
let CAT_ICONS = {Продукты:'🛒',Транспорт:'⛽',Аптека:'💊',Рестораны:'🍕',Одежда:'👗',Кредиты:'🏦',Страховка:'🛡️',Подписки:'📱',Зарплата:'💰',Переводы:'💸',Прочее:'📦'};
let CAT_COLORS = {Продукты:'#ff9f43',Транспорт:'#54a0ff',Аптека:'#ff6b81',Рестораны:'#feca57',Одежда:'#a29bfe',Кредиты:'#fd79a8',Страховка:'#00cec9',Подписки:'#6c5ce7',Зарплата:'#22d98a',Переводы:'#fdcb6e',Прочее:'#636e72'};
const KEY = 'finance-io-v3';
let transactions=[], budgets={}, nextId=1, selectedMonth=null, currentFilter='all', currentSort='date-desc', addModalType='expense';

// ── Storage ──
async function saveData(){
  const data={transactions,nextId,budgets,CAT_ICONS,CAT_COLORS};
  if(window.storage) await window.storage.set(KEY, JSON.stringify(data));
  else localStorage.setItem(KEY, JSON.stringify(data));
}
async function loadData(){
  const raw = window.storage ? await window.storage.get(KEY) : localStorage.getItem(KEY);
  if(raw){
    const p=JSON.parse(raw);
    transactions=p.transactions||[]; nextId=p.nextId||1; budgets=p.budgets||{};
    if(p.CAT_ICONS) CAT_ICONS=p.CAT_ICONS; if(p.CAT_COLORS) CAT_COLORS=p.CAT_COLORS;
  }
}

// ── Logic ──
function guessCategory(n){
  n=n.toUpperCase();
  if(/PRISMA|LIDL|KONSUM|SELVER|RIMI|MAXIMA/.test(n)) return 'Продукты';
  if(/BOLT|FUEL|TANKLA|OLEREX/.test(n)) return 'Транспорт';
  if(/NETFLIX|SPOTIFY|YOUTUBE/.test(n)) return 'Подписки';
  if(/PALK|SALARY|WAGES/.test(n)) return 'Зарплата';
  return 'Прочее';
}

function getFiltered(){ 
  let tx = selectedMonth ? transactions.filter(t=>t.date.startsWith(selectedMonth)) : transactions;
  const search = document.getElementById('searchBox').value.toLowerCase();
  if(search) tx = tx.filter(t=>t.name.toLowerCase().includes(search));
  return tx;
}

// ── Rendering ──
function renderAll(){
  renderMonths(); renderStats(); renderDonut(); renderBudgets(); renderTx(); renderChart(); renderPeriodStats(); renderForecast();
}

function renderMonths(){
  const months=[...new Set(transactions.map(t=>t.date.slice(0,7)))].sort().reverse();
  document.getElementById('monthStrip').innerHTML=`<div class="pill ${!selectedMonth?'active':''}" onclick="selectedMonth=null;renderAll()">Все</div>` + 
    months.map(m=>`<div class="pill ${selectedMonth===m?'active':''}" onclick="selectedMonth='${m}';renderAll()">${m}</div>`).join('');
}

function renderStats(){
  const tx=getFiltered();
  const inc=tx.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0);
  const exp=tx.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);
  document.getElementById('sInc').textContent=inc.toFixed(2)+' €';
  document.getElementById('sExp').textContent=exp.toFixed(2)+' €';
  document.getElementById('sBal').textContent=(inc-exp).toFixed(2)+' €';
}

function renderTx(){
  const tx=getFiltered();
  document.getElementById('txList').innerHTML=tx.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`
    <div class="tx-item">
      <div class="tx-ico" style="background:${CAT_COLORS[t.cat]}20">${CAT_ICONS[t.cat]||'📦'}</div>
      <div class="tx-info"><div class="tx-name">${t.name}</div><div class="tx-meta">${t.date} • ${t.cat}</div></div>
      <div class="tx-right"><div class="tx-amt ${t.amount>0?'pos':''}">${t.amount.toFixed(2)} €</div></div>
    </div>`).join('') || '<div class="empty-state">Нет данных</div>';
}

function renderDonut(){
  const tx=getFiltered().filter(t=>t.amount<0);
  const totals={}; tx.forEach(t=>totals[t.cat]=(totals[t.cat]||0)+Math.abs(t.amount));
  const total=Object.values(totals).reduce((a,b)=>a+b,0)||1;
  document.getElementById('donutTotal').textContent=Math.round(total);
  const svg=document.getElementById('donutSvg'); svg.querySelectorAll('.seg').forEach(n=>n.remove());
  let offset=0;
  Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([cat,val])=>{
    const pct=(val/total)*100; const color=CAT_COLORS[cat]||'#636e72';
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('class','seg'); c.setAttribute('cx','21');c.setAttribute('cy','21');c.setAttribute('r','15.9');
    c.setAttribute('fill','transparent');c.setAttribute('stroke',color);c.setAttribute('stroke-width','4.5');
    c.setAttribute('stroke-dasharray',`${pct} ${100-pct}`);c.setAttribute('stroke-dashoffset',-offset);
    svg.appendChild(c); offset+=pct;
  });
}

function renderBudgets(){
  const tx=getFiltered().filter(t=>t.amount<0);
  const spent={}; tx.forEach(t=>spent[t.cat]=(spent[t.cat]||0)+Math.abs(t.amount));
  document.getElementById('budgetList').innerHTML=Object.entries(budgets).map(([cat,lim])=>{
    const s=spent[cat]||0, pct=Math.min(s/lim*100,100);
    return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:11px;"><span>${cat}</span><span>${s.toFixed(0)}/${lim} €</span></div>
    <div class="b-track"><div class="b-fill" style="width:${pct}%;background:${pct>90?'var(--red)':'var(--accent)'}"></div></div></div>`;
  }).join('');
}

function renderForecast(){
  if(!selectedMonth) { document.getElementById('forecastBody').innerHTML='Выберите месяц'; return; }
  const tx=getFiltered(); const exp=tx.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);
  const daysInMonth=new Date(selectedMonth.split('-')[0], selectedMonth.split('-')[1], 0).getDate();
  const today = new Date().toISOString().startsWith(selectedMonth) ? new Date().getDate() : daysInMonth;
  const daily = exp/today, proj = daily*daysInMonth;
  document.getElementById('forecastBody').innerHTML=`<div class="fc-bar-wrap"><div class="fc-actual" style="width:${(exp/proj*100)}%;background:var(--red);"></div><div class="fc-marker" style="left:${(today/daysInMonth*100)}%"></div></div>
  <div style="font-size:12px;margin-top:10px;">Прогноз: ${proj.toFixed(0)} € (в день: ${daily.toFixed(0)} €)</div>`;
}

function renderPeriodStats(){
  const tx=getFiltered();
  document.getElementById('periodGrid').innerHTML=`<div class="p-tile"><div class="p-label">Транзакций</div><div class="p-val">${tx.length}</div></div>
  <div class="p-tile"><div class="p-label">Ср. чек</div><div class="p-val">${(tx.filter(t=>t.amount<0).reduce((a,b)=>a+Math.abs(b.amount),0)/(tx.filter(t=>t.amount<0).length||1)).toFixed(0)} €</div></div>`;
}

function renderChart(){
  const svg=document.getElementById('chartSvg'); svg.innerHTML='';
  const tx=getFiltered(); const days={};
  tx.forEach(t=>{ const d=t.date.split('-')[2]; days[d]=(days[d]||0)+Math.abs(t.amount); });
  const max=Math.max(...Object.values(days), 10);
  Object.entries(days).forEach(([d,v],i)=>{
    const h=(v/max)*120, x=i*20;
    svg.innerHTML+=`<rect x="${x}" y="${140-h}" width="12" height="${h}" fill="var(--red)" rx="2" opacity="0.6"/>`;
  });
}

// ── Actions ──
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function setAddType(t){addModalType=t; document.getElementById('addBtnExp').style.opacity=t==='expense'?1:0.5; document.getElementById('addBtnInc').style.opacity=t==='income'?1:0.5;}

function addTxModal(){
  const name=document.getElementById('moTxName').value, amt=parseFloat(document.getElementById('moTxAmt').value), date=document.getElementById('moTxDate').value;
  if(!name||!amt||!date) return;
  transactions.push({id:nextId++, name, amount:addModalType==='expense'?-amt:amt, date, cat:guessCategory(name), pending:false});
  saveData(); renderAll(); closeOv('addOv');
}

function handleCSV(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n');
    lines.slice(1).forEach(l=>{
      const c=l.split(';'); if(c.length<6)return;
      const date=c[2].replace(/"/g,''), name=c[3].replace(/"/g,''), amt=parseFloat(c[5].replace(',','.'));
      transactions.push({id:nextId++, name, amount:amt, date, cat:guessCategory(name), pending:false});
    });
    saveData(); renderAll(); closeOv('importOv');
  };
  reader.readAsText(file);
}

function saveBudget(){
  const cat=document.getElementById('budgetCat').value, lim=parseFloat(document.getElementById('budgetLimit').value);
  if(cat&&lim) { budgets[cat]=lim; saveData(); renderAll(); closeOv('budgetOv'); }
}

function setInsightTab(t){
  document.getElementById('insightStats').style.display=t==='stats'?'block':'none';
  document.getElementById('insightForecast').style.display=t==='forecast'?'block':'none';
  document.getElementById('itabStats').classList.toggle('active', t==='stats');
  document.getElementById('itabForecast').classList.toggle('active', t==='forecast');
}

function setChartMode(m){ renderChart(); }

function exportJSON(){
  const blob=new Blob([JSON.stringify({transactions,budgets,CAT_ICONS,CAT_COLORS})],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='finance_io.json'; a.click();
}

function openAddOv(){
  document.getElementById('moTxCat').innerHTML=Object.keys(CAT_ICONS).map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('moTxDate').value=new Date().toISOString().split('T')[0];
  openOv('addOv');
}

window.onload=async()=>{
  await loadData();
  document.getElementById('budgetCat').innerHTML=Object.keys(CAT_ICONS).map(c=>`<option value="${c}">${c}</option>`).join('');
  renderAll();
};
</script>
</body>
</html>
