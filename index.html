<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCE.IO // 2026 NEXT-GEN</title>
    
    <meta name="description" content="Умный финансовый трекер 2026 года с AI-аналитикой и Bento-дизайном">
    <meta property="og:title" content="FINANCE.IO // 2026">
    <meta property="og:description" content="Управляй финансами в стиле Bento. Glassmorphism 2.0.">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23ff7d6d%22/></svg>">

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZpbmFuY2UuSU8gMjAyNiIsCiAgInNob3J0X25hbWUiOiAiRmluYW5jZTI2IiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzA1MDUwOCIsCiAgInRoZW1lX2NvbG9yIjogIiNmZjdkNmQiLAogICJpY29ucyI6IFsKICAgIHsgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yNDg5LzI0ODk0NjIucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH0KICBdCn0=">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050508;
            --glass-bg: rgba(22, 22, 35, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #ff7d6d;
            --accent-secondary: #00f2a6;
            --text-main: #f0f0f5;
            --text-muted: #8a8a9d;
            --font-main: 'Space Mono', monospace;
            --font-title: 'Unbounded', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 125, 109, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 166, 0.08) 0%, transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(160px, auto);
            gap: 24px;
            margin-bottom: 32px;
        }

        .bento-item {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .bento-item:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        /* 2026 Elements */
        .logo { font-family: var(--font-title); font-size: 1.4rem; display: flex; align-items: center; gap: 12px; }
        .logo-dot { width: 12px; height: 12px; background: var(--accent-primary); border-radius: 50%; box-shadow: 0 0 20px var(--accent-primary); }
        
        .amount-hero { font-family: var(--font-title); font-size: clamp(1.8rem, 5vw, 2.8rem); display: block; margin: 12px 0; letter-spacing: -2px; }
        .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Donut Chart */
        .donut-box { display: flex; align-items: center; justify-content: center; height: 100%; position: relative; }
        #donut-svg { transform: rotate(-90deg); transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .donut-center { position: absolute; text-align: center; font-family: var(--font-title); }

        /* Actions */
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
            padding: 14px 28px; border-radius: 20px; cursor: pointer; font-family: var(--font-main);
            transition: 0.4s; font-weight: 700; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px rgba(255,255,255,0.3); }
        .btn-primary { background: var(--accent-primary); color: #000; border: none; }

        .glass-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            color: #fff; padding: 18px; border-radius: 20px; font-family: var(--font-main); transition: 0.3s;
        }
        .glass-input:focus { border-color: var(--accent-primary); background: rgba(255,255,255,0.08); }

        /* Transaction List */
        .tx-card {
            display: grid; grid-template-columns: 56px 1fr auto; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.02); border-radius: 24px; margin-bottom: 12px;
            transition: 0.3s; border: 1px solid transparent;
        }
        .tx-card:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-border); transform: scale(1.02); }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } .span-all { grid-column: span 2; } }
        @media (max-width: 600px) { .bento-grid { grid-template-columns: 1fr; } .span-all { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <div class="logo"><div class="logo-dot"></div> FINANCE.IO // 26</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn" onclick="exportData()">Export</button>
            <button class="btn btn-primary" onclick="importData()">Import</button>
        </div>
    </header>

    <div id="months" style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 24px; scrollbar-width: none;"></div>

    <div class="bento-grid">
        <div class="bento-item span-all" style="grid-column: span 2;">
            <span class="label">Total Balance</span>
            <span class="amount-hero" id="bal">0.00 €</span>
            <div style="display: flex; gap: 40px; margin-top: 16px;">
                <div><span class="label">Incomes</span><div style="color: var(--accent-secondary); font-family: var(--font-title);" id="inc">+0.00</div></div>
                <div><span class="label">Expenses</span><div style="color: var(--accent-primary); font-family: var(--font-title);" id="exp">-0.00</div></div>
            </div>
        </div>

        <div class="bento-item" style="grid-row: span 2;">
            <span class="label">Distribution</span>
            <div class="donut-box">
                <svg id="donut-svg" width="180" height="180" viewBox="0 0 42 42">
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="4"></circle>
                </svg>
                <div class="donut-center"><span id="donut-val" style="font-size: 1.4rem;">0</span><br><small style="font-size: 0.6rem; color: var(--text-muted);">EUR</small></div>
            </div>
        </div>

        <div class="bento-item" style="background: linear-gradient(135deg, rgba(255,125,109,0.1), transparent);">
            <span class="label">AI Insight</span>
            <p id="ai" style="font-size: 0.8rem; margin-top: 16px; opacity: 0.9;">Оптимизирую поток данных...</p>
        </div>

        <div class="bento-item">
            <span class="label">Monthly Shield</span>
            <div style="margin-top: 24px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px;">
                    <span id="status">Secure</span><span id="perc">0%</span>
                </div>
                <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;">
                    <div id="bar" style="height: 100%; width: 0%; background: var(--accent-primary); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);"></div>
                </div>
            </div>
        </div>

        <div class="bento-item span-all" style="grid-column: span 2;">
            <span class="label">Quick Action</span>
            <form id="tx-form" style="display: flex; gap: 12px; margin-top: 16px;">
                <input type="text" id="name" class="glass-input" placeholder="Shop/Service" required style="flex: 2;">
                <input type="number" id="amt" class="glass-input" placeholder="€" step="0.01" required style="flex: 1;">
                <button type="submit" class="btn btn-primary" style="border-radius: 20px; width: 56px;">+</button>
            </form>
        </div>
    </div>

    <div class="bento-item span-all" style="grid-column: span 4;">
        <h3 style="font-family: var(--font-title); font-size: 1rem; margin-bottom: 24px;">History Flow</h3>
        <div id="history"></div>
    </div>
</div>

<script>
    // --- State Management ---
    let state = {
        transactions: [],
        categories: {
            'Groceries': { emoji: '🛒', color: '#00f2a6', keys: ['prisma','lidl','selver','rimu','maxima','coop'] },
            'Mobility': { emoji: '⛽', color: '#35baf6', keys: ['bolt','uber','olerex','circle','fuel','bus'] },
            'Fun': { emoji: '🎮', color: '#ff7d6d', keys: ['netflix','spotify','cinema','steam','bar','pizza'] },
            'Income': { emoji: '💰', color: '#00f2a6', keys: ['salary','palk','transfer'] },
            'Other': { emoji: '📦', color: '#8a8a9d', keys: [] }
        },
        selectedMonth: new Date().toISOString().substring(0, 7)
    };

    const DB_KEY = 'FINANCE_2026_PRO_DEPLOY';

    function init() {
        const saved = localStorage.getItem(DB_KEY);
        if (saved) state = JSON.parse(saved);
        else seed();
        render();
    }

    function seed() {
        const m = state.selectedMonth;
        state.transactions = [{ id: 1, name: 'Salary', amount: 3500, cat: 'Income', date: `${m}-01`, type: 'income' }];
    }

    function render() {
        const filtered = state.transactions.filter(t => t.date.startsWith(state.selectedMonth));
        const inc = filtered.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const exp = filtered.filter(t => t.type === 'expense').reduce((s, t) => s + Math.abs(t.amount), 0);
        
        document.getElementById('bal').innerText = `${(inc - exp).toFixed(2)} €`;
        document.getElementById('inc').innerText = `+${inc.toFixed(2)}`;
        document.getElementById('exp').innerText = `-${exp.toFixed(2)}`;
        
        // Donut
        const totals = {};
        filtered.filter(t=>t.type==='expense').forEach(t => totals[t.cat] = (totals[t.cat] || 0) + Math.abs(t.amount));
        const totalExp = Object.values(totals).reduce((a, b) => a + b, 0);
        document.getElementById('donut-val').innerText = Math.round(totalExp);
        const svg = document.getElementById('donut-svg');
        svg.querySelectorAll('.slice').forEach(n => n.remove());
        let offset = 0;
        Object.entries(totals).forEach(([cat, val]) => {
            const perc = (val / totalExp) * 100;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("class", "slice"); circle.setAttribute("cx", "21"); circle.setAttribute("cy", "21"); circle.setAttribute("r", "15.9155");
            circle.setAttribute("fill", "transparent"); circle.setAttribute("stroke", state.categories[cat]?.color || '#fff');
            circle.setAttribute("stroke-width", "4"); circle.setAttribute("stroke-dasharray", `${perc} ${100 - perc}`);
            circle.setAttribute("stroke-dashoffset", -offset); circle.style.transition = "1.5s";
            svg.appendChild(circle); offset += perc;
        });

        // History
        document.getElementById('history').innerHTML = filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t => `
            <div class="tx-card">
                <div style="font-size: 1.5rem;">${state.categories[t.cat]?.emoji || '📦'}</div>
                <div><div style="font-weight: 700;">${t.name}</div><div style="font-size: 0.7rem; color: var(--text-muted);">${t.date}</div></div>
                <div style="font-family: var(--font-title); color: ${t.type==='income'?'var(--accent-secondary)':'#fff'}">${t.amount.toFixed(2)} €</div>
            </div>`).join('');

        // AI & Progress
        const p = Math.min((exp / 2500) * 100, 100);
        document.getElementById('bar').style.width = p + '%';
        document.getElementById('perc').innerText = Math.round(p) + '%';
        document.getElementById('ai').innerText = exp > 2000 ? "Внимание: расходы превышают норму на 12%. Проверьте подписки." : "Идеальный баланс. Вы сохраняете 25% своего дохода.";

        localStorage.setItem(DB_KEY, JSON.stringify(state));
    }

    document.getElementById('tx-form').onsubmit = (e) => {
        e.preventDefault();
        const n = document.getElementById('name').value;
        const a = parseFloat(document.getElementById('amt').value);
        state.transactions.push({ id: Date.now(), name: n, amount: a, cat: autoCat(n), date: new Date().toISOString().substring(0, 10), type: a > 0 ? 'income' : 'expense' });
        e.target.reset(); render();
    };

    function autoCat(n) {
        n = n.toLowerCase();
        for (let [cat, data] of Object.entries(state.categories)) {
            if (data.keys.some(k => n.includes(k))) return cat;
        }
        return 'Other';
    }

    function exportData() {
        const b = new Blob([JSON.stringify(state)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'finance_2026.json'; a.click();
    }

    // PWA Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9PiBlLnJlc3BvbmRXaXRoKGZldGNoKGUucmVxdWVzdCkpKTs=');
    }

    init();
</script>
</body>
</html>
